<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Smile Avenue</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9941a;
      --gold-light: #e7ba63;
      --bg: #090909;
      --card: rgba(18, 18, 18, 0.92);
      --line: rgba(201, 148, 26, 0.26);
      --text: #f7f1e8;
      --muted: #a79b88;
      --danger: #ef6c6c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", sans-serif;
      color: var(--text);
      padding: 18px;
      background:
        radial-gradient(ellipse 55% 55% at 80% 10%, rgba(201, 148, 26, 0.18), transparent 70%),
        radial-gradient(ellipse 60% 80% at 5% 95%, rgba(201, 148, 26, 0.12), transparent 70%),
        var(--bg);
    }

    .card {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(7px);
    }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 1.85rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid rgba(201, 148, 26, 0.28);
      border-radius: 10px;
      background: rgba(9, 9, 9, 0.8);
      color: var(--text);
      padding: 11px 12px;
      font-size: 0.94rem;
      min-height: 44px;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--gold-light);
      box-shadow: 0 0 0 3px rgba(201, 148, 26, 0.15);
    }

    .btn {
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #a37613);
      color: #080808;
      font-weight: 800;
      font-size: 0.92rem;
      padding: 12px 14px;
      cursor: pointer;
    }

    .btn:hover { filter: brightness(1.08); }

    .error {
      border: 1px solid rgba(239, 108, 108, 0.35);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(239, 108, 108, 0.12);
      color: #ffc6c6;
      font-size: 0.85rem;
    }

    .back {
      margin-top: 14px;
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      display: inline-block;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Admin Login</h1>
    <p class="sub">Вход в панель заявок Smile Avenue</p>

    <form class="form" method="post" action="/admin/login">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <div>
        <label for="username">Логин</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </div>

      <div>
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button class="btn" type="submit">Войти</button>
    </form>

    <a class="back" href="/">← На сайт</a>
  </main>
</body>
</html>
